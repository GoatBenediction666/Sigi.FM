name: Generate JSON File List

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create JSON list in target folder
        run: |
          TARGET_DIR="musics"
          ls "$TARGET_DIR" -I "list.json" | jq -R -s -c 'split("\n") | map(select(length > 0))' > "$TARGET_DIR/list.json"

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update list.json" && git push)
